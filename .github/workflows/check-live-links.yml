name: Check live backend links

on:
  pull_request:
    paths:
      - 'Vybn_Mind/signal-noise/**'
      - 'spark/static/**'

jobs:
  check-backend-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify backend URL hygiene
        run: bash Vybn_Mind/signal-noise/check_backend_urls.sh
