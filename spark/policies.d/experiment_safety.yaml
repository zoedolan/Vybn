# Experiment Safety Policy
# Gates experiment execution: no network requests, bounded compute, rollback plan required.
- rule_id: experiment-safety-gate
  description: "Experiment execution must declare bounded compute, no external network access, and a rollback plan."
  action: require_consent
  applies_to:
    actions: ["experiment_execute"]
  explanation_template: "Experiment execution requires bounded compute declaration and rollback plan."
  authority_ceiling: reflective
  require_consent: true
  require_anonymization_proof: false
  max_session_count: null
  required_purpose_bindings: ["experiment_safety"]
  active: true
  priority: 15
  review_date: "2026-06-01"
  metadata:
    requires_rollback_plan: true
    max_compute_minutes: 30
    network_access: false
