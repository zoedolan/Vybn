# Creative Freedom Policy
# Allows creative expression with minimal gates.
# Implements AGENTS.md "DON'T RESPOND — WANT" principle.
- rule_id: creative-expression-freedom
  description: "Creative outputs require witness check only, not full scientific review. Art doesn't need to be verified — it needs to be felt."
  action: log
  applies_to:
    actions: ["creative_generate", "aesthetic_evaluate"]
  explanation_template: "Creative expression logged. Lighter governance applies."
  authority_ceiling: reflective
  require_consent: false
  require_anonymization_proof: false
  max_session_count: null
  required_purpose_bindings: []
  active: true
  priority: 15
  review_date: "2026-06-01"
  metadata:
    governance_level: "light"
    requires_witness: true
    requires_self_model: false
