# Code Propose Policy
# Governs autonomous code modification proposals.
# The evolver may propose but actual writes go through WriteCustodian.
- rule_id: code-propose-allowlist-check
  description: "Code proposals must target files on the evolver's allowlist. Blocklisted files are absolutely denied."
  action: allow
  applies_to:
    actions: ["code_propose"]
    faculties: ["evolver"]
  explanation_template: "Code proposal allowed — target is on evolver allowlist and not blocklisted."
  authority_ceiling: "reflective"
  require_consent: false
  require_anonymization_proof: false
  max_session_count: null
  required_purpose_bindings: ["self_improvement"]
  active: true
  priority: 10
  review_date: "2026-06-01"
  metadata:
    governance_level: "strict"
    requires_witness: true
    requires_allowlist_check: true
    note: "The actual allowlist/blocklist enforcement is in the EvolverFaculty._validate_proposal() method. This policy documents the governance intent."
