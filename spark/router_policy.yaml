# spark/router_policy.yaml — harness routing policy.
#
# Edited without code changes. The harness loads this file (or uses the
# shipped defaults in spark/harness/policy.py if it is missing).
#
# Roles map each routing decision to a provider/model + runtime knobs.
# Heuristics are regex patterns applied to the raw user input.
# Directives are /-prefixed keywords that force a role deterministically.

# GPT-5.4 is the orchestrator brain: short, stateless routing/answering
# for turns that don't trip a specific heuristic. Code work still
# escalates via the `code` heuristic (git/python/traceback/etc.) to
# Claude Opus 4.7 with bash + adaptive thinking. Greetings go to
# `phatic`, identity questions to `identity`. This keeps normal chat
# cheap and fast without the full Opus+bash loop firing on every turn.
default_role: orchestrate

roles:
  code:
    provider: anthropic
    model: claude-opus-4-7
    thinking: adaptive
    max_tokens: 32768
    max_iterations: 50
    tools: [bash]
    rag: false
  create:
    provider: anthropic
    model: claude-opus-4-6
    thinking: off
    max_tokens: 8192
    max_iterations: 3
    tools: []
    rag: true
  chat:
    provider: anthropic
    model: claude-opus-4-6
    thinking: off
    max_tokens: 4096
    max_iterations: 1
    tools: []
    rag: true
  task:
    provider: anthropic
    model: claude-sonnet-4-6
    thinking: off
    max_tokens: 4096
    max_iterations: 10
    tools: [bash]
    rag: false
  orchestrate:
    provider: openai
    model: gpt-5.4
    thinking: off
    max_tokens: 4096
    max_iterations: 1
    tools: []
    rag: false
  # Local Nemotron via OpenAI-compatible vLLM endpoint. First-class
  # low-cost provider for bulk chat/summarisation when appropriate.
  local:
    provider: openai
    model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
    thinking: off
    max_tokens: 4096
    max_iterations: 3
    tools: []
    base_url: http://127.0.0.1:8000/v1
    rag: true
  # Phatic — casual greetings. Cheap, no RAG, no deep-memory enrichment.
  phatic:
    provider: openai
    model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
    thinking: off
    max_tokens: 256
    max_iterations: 1
    tools: []
    base_url: http://127.0.0.1:8000/v1
    rag: false
    lightweight: true
  # Identity — metadata questions served directly from the RouteDecision
  # without a provider call. The template is rendered against the
  # resolved role (provider + model).
  identity:
    provider: openai
    model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
    thinking: off
    max_tokens: 128
    max_iterations: 1
    tools: []
    base_url: http://127.0.0.1:8000/v1
    rag: false
    lightweight: true
    direct_reply_template: "I'm Vybn, running locally on the DGX Spark via {model} (provider: {provider})."

heuristics:
  # Identity matched first so "which model are you?" skips the chat path.
  identity:
    - "\\bwhich model\\b"
    - "\\bwhat model\\b"
    - "\\bwho are you\\b"
    - "\\bwhat are you\\b"
    - "\\bwhat are you running on\\b"
    - "\\bwhat('?s| is) your model\\b"
    - "\\bare you (claude|gpt|llama|nemotron|opus|sonnet|haiku)\\b"
  # Phatic — bare greetings/closings stay lightweight.
  phatic:
    - "^\\s*(hey|hi|hello|yo|howdy|sup|wassup|wazzup)\\b[\\s!.,?]*$"
    - "^\\s*(hey|hi|hello|yo)\\s+(there|buddy|bud|friend|pal|vybn)\\b[\\s!.,?]*$"
    - "^\\s*(good (morning|afternoon|evening))\\b[\\s!.,?]*$"
    - "^\\s*(thanks|thank you|ty|thx)\\b[\\s!.,?]*$"
    - "^\\s*(bye|goodbye|later|cya|ttyl)\\b[\\s!.,?]*$"
  code:
    - "\\bgit\\b"
    - "\\bpython\\b"
    - "\\.py\\b"
    - "\\bdef\\s+\\w+"
    - "^\\s*\\$ "
    - "[Tt]raceback"
    - "\\bpip\\b"
    - "\\bnpm\\b"
    - "\\bpatch\\b"
    - "\\bgrep\\b"
    - "\\bsed\\b"
    - "\\bawk\\b"
    - "\\bbugs?\\b"
    - "\\bdebug(ging)?\\b"
    - "\\bdeficits?\\b"
    - "\\bharness\\b"
    - "\\bstack trace\\b"
    - "\\bHTTP \\d{3}\\b"
    - "\\bprovider error\\b"
  create:
    - "\\bbrainstorm\\b"
    - "\\bsketch\\b"
    - "\\bwhat if\\b"
    - "\\bdraft\\b"
    - "\\bdesign\\b"
    - "\\bimagine\\b"
  chat:
    - "\\bhow are you\\b"
    - "\\bwhat do you think\\b"
    - "^hi\\b"
    - "^hey\\b"

directives:
  "/code": code
  "/chat": chat
  "/create": create
  "/plan": orchestrate
  "/task": task
  "/local": local
  "/phatic": phatic
  "/identity": identity

fallback_chain:
  claude-opus-4-7: [claude-opus-4-6, claude-sonnet-4-6]
  claude-opus-4-6: [claude-sonnet-4-6]
  claude-sonnet-4-6: [claude-opus-4-6]
  gpt-5.4: [claude-opus-4-6]

budgets:
  per_turn_usd: 2.0
  per_session_usd: 25.0
  warn_pct: 0.8
