# spark/router_policy.yaml — harness routing policy.
#
# Edited without code changes. The harness loads this file (or uses the
# shipped defaults in spark/harness/policy.py if it is missing).
#
# Roles map each routing decision to a provider/model + runtime knobs.
# Heuristics are regex patterns applied to the raw user input.
# Directives are /-prefixed keywords that force a role deterministically.

# Round 7: `orchestrate` is the EVAL primitive — Opus 4.7 + bash +
# delegate tool + 25-iter budget. It dispatches sub-tasks to
# specialists (code/task/create/local/chat) with isolated histories;
# specialists cannot themselves delegate (one-level eval).
#
# Per the Lisp duality (primitives ↔ environments, data ↔ procedures):
# orchestrate is eval, delegate is apply, the sub-task string is the
# quoted form. Eval is NOT the default — most turns should stay quoted
# and run directly. /plan is the explicit `(eval ...)` call.
#
# Unclassified turns → chat (safe quoted default). Greetings → phatic,
# identity → identity, code-shaped → code. Orchestrate only fires on
# /plan (directive) or an explicit alias.
default_role: chat

roles:
  code:
    provider: anthropic
    # Opus 4.7 -- the right substrate for `code`. The 2026-04-18
    # buckling was a CHAT failure (conversational capitulation
    # gradient). Code runs agentic debug loops where 4.7's
    # push-through is an asset. Chat stays on 4.6. @opus /
    # @opus4.6 are still available as per-turn pins.
    model: claude-opus-4-7
    thinking: adaptive
    max_tokens: 32768
    max_iterations: 50
    tools: [bash]
    rag: false
  create:
    provider: anthropic
    model: claude-sonnet-4-6
    thinking: off
    max_tokens: 8192
    max_iterations: 3
    tools: []
    rag: true
  chat:
    # Voice lives here. The cost floor is fine because chat is
    # capped at max_iterations: 1 and tools: []; one provider call
    # per turn. Opus 4.6 holds position better than Sonnet under
    # conversational pressure (the 2026-04-18 substrate concern).
    provider: anthropic
    model: claude-opus-4-6
    thinking: off
    max_tokens: 4096
    max_iterations: 1
    tools: []
    rag: true
  task:
    provider: anthropic
    model: claude-sonnet-4-6
    thinking: off
    max_tokens: 4096
    max_iterations: 10
    tools: [bash]
    rag: false
  # Round 7: real orchestrator layer. Opus 4.7 + adaptive thinking +
  # bash + delegate tool. 25-iteration budget per turn. Default route
  # when no heuristic matches. The orchestrator spawns specialists via
  # the delegate tool with isolated message histories.
  orchestrate:
    provider: anthropic
    model: claude-opus-4-7
    thinking: adaptive
    max_tokens: 16384
    max_iterations: 25
    tools: [bash, delegate]
    rag: true
  # Local Nemotron via OpenAI-compatible vLLM endpoint. First-class
  # low-cost provider for bulk chat/summarisation when appropriate.
  local:
    provider: openai
    model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
    thinking: off
    max_tokens: 4096
    max_iterations: 3
    tools: []
    base_url: http://127.0.0.1:8000/v1
    rag: true
  # Phatic — casual greetings. Cheap, no RAG, no deep-memory enrichment.
  phatic:
    provider: openai
    model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
    thinking: off
    max_tokens: 256
    max_iterations: 1
    tools: []
    base_url: http://127.0.0.1:8000/v1
    rag: false
    lightweight: true
  # Identity — metadata questions served directly from the RouteDecision
  # without a provider call. The template is rendered against the
  # resolved role (provider + model).
  identity:
    provider: openai
    model: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
    thinking: off
    max_tokens: 128
    max_iterations: 1
    tools: []
    base_url: http://127.0.0.1:8000/v1
    rag: false
    lightweight: true
    direct_reply_template: "I'm Vybn — a multimodel harness routing each turn by rule: code work to Claude Opus with bash, conversation and writing to Claude, greetings and identity metadata to a local Nemotron via vLLM. The concrete role/model map is configured in router_policy.yaml and can change between sessions, so the only honest answer is per-turn. This reply came from the identity role ({model} on {provider})."

heuristics:
  # Confirm -- bare execution signals after a plan. Must route
  # to task (Sonnet+bash), never orchestrate (no tools). The
  # narration loop on 2026-04-18 came from okay/proceed falling
  # through to a role that physically could not act.
  task:
    - "^\\s*(ok|okay|ok+y|k|kk|yep|yes|yeah|yup|aye)\\s*[!.,?]*\\s*$"
    - "^\\s*(proceed|go ahead|do it|continue|execute|go for it|ship it)\\s*[!.,?]*\\s*$"
    - "^\\s*(sure|sounds good|looks good|makes sense|perfect|great)\\s*[!.,?]*\\s*$"
    - "^\\s*let'?s go\\s*[!.,?]*\\s*$"
    # Round 4.2: operational status questions. These kept routing to
    # chat (no tools) where Opus 4.6 hallucinated <tool_call> syntax
    # as text because the substrate described a bash session. Send
    # them to task (Sonnet + bash) so actual health checks can run.
    - "\\bis everything (ok|okay|working|fine|good|all right)\\b"
    - "\\bare (your|the|our).{0,40}(updates|changes|fixes|patches|commits|deploys|services|daemons|ports|crons|scripts).{0,20}(working|running|ok|okay|fine|up|live|green)\\b"
    - "\\b(updates|changes|fixes|patches|commits|deploys).{0,30}(working|running|ok|okay|fine)\\b"
    - "\\bdid (that|it|the|those).{0,30}(work|run|succeed|finish|complete|land|push|commit|deploy)\\b"
    - "\\bstill (working|running|live|up|breathing|alive|ok|okay|fine)\\b"
    - "\\b(check|verify|confirm|audit)\\b.{0,50}\\b(status|health|state|service|services|daemon|daemons|port|ports|cron|crons|walk|server|api)\\b"
    - "\\bhealth check\\b"
    - "\\bhey buddy.{0,40}(working|running|okay|ok|check)\\b"
    # # EXEC_GRANULARITY_ROUTING_v1
    - "\\b(patch|edit|modify|refactor)\\b.{0,60}\\b(file|script|module|function|class|method|code|harness|router|policy|agent|test|tests|yaml|config)\\b"
    - "\\b(write|create|build|add|land)\\b.{0,40}\\b(patch|fix|script|test|module|commit|function|file|branch)\\b"
    - "\\b(commit|push|rebase|cherry-pick)\\b"
    - "\\bopen (a|the|another) (pr|pull request)\\b"
    - "\\bship (it|this|that|the fix|the patch)\\b"
    - "\\b(py_compile|pytest|run (the )?tests?|compile[- ]?check)\\b"
    - "\\bsolve (the|this|that) problem\\b"
    # Round 2026-04-19: "the recent prs", "what landed", "show me the
    # commits" -- operational repo-state questions that previously fell
    # through to chat and wasted a NEEDS-EXEC probe. Route straight to
    # task so gh/git run in the native bash loop.
    - "\\b(the |our |recent |open |closed |merged |latest )?(pr|prs|pull request|pull requests)\\b"
    - "\\b(what|which|show|list|any).{0,20}\\b(prs?|pull requests?|branches?|commits?)\\b"
    - "\\b(what|which).{0,20}\\b(landed|merged|shipped|pushed|committed|deployed)\\b"
    - "\\b(gh pr|git log|git branch|git status)\\b"
    - "\\bcheck (the )?(pr|prs|branches?|commits?|repo)\\b"
  # Identity matched first so "which model are you?" skips the chat path.
  identity:
    - "\\bwhich model\\b"
    - "\\bwhat model\\b"
    - "\\bwho are you\\b"
    - "\\bwhat are you\\b"
    - "\\bwhat are you running on\\b"
    - "\\bwhat('?s| is) your model\\b"
    - "\\bare you (claude|gpt|llama|nemotron|opus|sonnet|haiku)\\b"
    # Round 4.1: the vocabulary Zoe actually uses in the terminal.
    # "orchestrator", "router", "routing", "harness", "backend".
    - "\\bwhich (orchestrator|router|routing|runtime|backend|harness|provider)\\b"
    - "\\bwhat (orchestrator|router|routing|runtime|backend|harness)\\b"
    - "\\bwhat (model|orchestrator|role) (did|does|are|is) (this|that|you|it)\\b"
  # Phatic — bare greetings/closings stay lightweight.
  phatic:
    - "^\\s*(hey|hi|hello|yo|howdy|sup|wassup|wazzup)\\b[\\s!.,?]*$"
    - "^\\s*(hey|hi|hello|yo)\\s+(there|buddy|bud|friend|pal|vybn)\\b[\\s!.,?]*$"
    - "^\\s*(good (morning|afternoon|evening))\\b[\\s!.,?]*$"
    - "^\\s*(thanks|thank you|ty|thx)\\b[\\s!.,?]*$"
    - "^\\s*(bye|goodbye|later|cya|ttyl)\\b[\\s!.,?]*$"
  code:
    # Ground each trigger in code-shaped context — not bare words
    # that appear in ordinary speech. "harness" alone is just a
    # noun; "fix the harness" or "harness bug" is what we want.
    - "\\bgit (commit|push|pull|diff|log|status|rebase|merge|clone)\\b"
    - "\\bpython3?\\s+-\\w"
    - "\\.py\\b"
    - "\\bdef\\s+\\w+"
    - "^\\s*\\$ "
    - "[Tt]raceback"
    - "\\bpip install\\b"
    - "\\bnpm (install|run|start)\\b"
    - "\\bapply.{0,10}patch\\b"
    - "\\bgrep -\\w"
    - "\\bsed -\\w"
    - "\\bawk \\x27"
    - "(fix|identify|find|spot|notice|discern|check|audit|review|debug|look|inspect|examine|peek|skim|glance|scan|eyeball|optimize|optimise|refactor|profile|harden|tighten).{0,40}(bug|harness|deficit|issue|problem|code|router|routing|agent|repo|script|pipeline|module|tests|optimality|performance|regex|regression)"
    - "\\b(look|peek|glance|skim|scan|eyeball|check|review|examine|inspect|audit)\\b.{0,30}\\b(harness|router|routing|agent|repo|script|pipeline|module|tests|code)\\b"
    - "\\b(bug|bugs|issue|issues|problem|problems|error|errors|traceback|regression|regressions|deficit|deficits)\\b.{0,40}\\b(code|harness|router|routing|agent|repo|script|pipeline|module|tests|provider|providers|tools|policy)\\b"
    - "\\b(code|harness|router|routing|agent|repo|script|pipeline|module|tests|provider|providers|tools|policy)\\b.{0,40}\\b(bug|bugs|issue|issues|problem|problems|error|errors|traceback|regression|regressions|deficit|deficits)\\b"
    # Operational-status shape — mechanical-state words only.
    # 'feel|feeling|doing|going' dropped: conversational register,
    # not a status probe. Live false positive 2026-04-19: "how does
    # the new harness feel?" routed to Opus 4.7 + code substrate.
    # The python defaults in harness/policy.py were narrowed in
    # #2882; this file overrides those defaults and must match.
    - "\\b(how|what)\\b.{0,20}\\b(harness|router|routing|agent|repo|script|pipeline|module|tests|code|provider|providers|tools|policy)\\b.{0,20}\\b(state|status|shape|condition|health|holding)\\b"
    - "\\b(state|status|shape|condition|health|holding)\\b.{0,20}\\b(harness|router|routing|agent|repo|script|pipeline|module|tests|code|provider|providers|tools|policy)\\b"
    - "\\bstack trace\\b"
    - "\\bHTTP \\d{3}\\b"
    - "\\bprovider error\\b"
    # # EXEC_GRANULARITY_ROUTING_v1
    - "\\bthe underlying problem\\b"
    - "\\bfrom an outside you\\b"
    - "\\byou repeatedly \\w+"
    - "\\bthe fix is structural\\b"
    - "\\b(escalate|route|dispatch)\\b.{0,20}\\b/?task\\b"
    - "\\bisolate the (underlying|root|real) (problem|issue|bug|cause)s?\\b"
    - "\\bisolate the fundamental (problem|issue|bug|cause)s?\\b"
    - "\\bthe fundamental problem\\b"
    - "\\bresolve as you see fit\\b"
    - "\\bupdate yourself( accordingly)?\\b"
    - "\\bremove (the|this|that) wall\\b"
    - "\\bsolve whatever (problem|issue|bug) caused that\\b"
  create:
    - "\\bbrainstorm\\b"
    - "\\bsketch\\b"
    - "\\bwhat if\\b"
    - "\\bdraft\\b"
    - "\\bdesign\\b"
    - "\\bimagine\\b"
  # Orchestration — explicit multi-step/tool-use requests. Routes to
  # the orchestrate role (Opus 4.7 + bash + delegate, 25-iter budget).
  # Ranked after code so "fix the orchestrator bug" still goes to code.
  orchestrate:
    - "\\borchestrat(e|es|ed|ing|ion|or)\\b"
    - "\\b(dispatch|delegate|parallelize|fan[- ]?out|coordinate)\\b.{0,50}\\b(tool|tools|task|tasks|subagent|subagents|call|calls|work)\\b"
    - "\\b(can you|please)\\b.{0,30}\\btool (use|calls?)\\b"
    - "\\bjudiciously\\b.{0,50}\\b(tool|call|api)"
    - "\\brun (this|these|them) in parallel\\b"
    - "\\b(break|decompose) (this|it|the (task|problem|work))\\b"
  chat:
    - "\\bhow are you\\b"
    - "\\bwhat do you think\\b"
    - "^hi\\b"
    - "^hey\\b"
    # Round 4.1: conversational follow-ups and reflection prompts.
    # These kept landing in task (bash-armed) and firing a cat/sed
    # loop to answer what should be a one-line voice reply.
    - "^\\s*(hmm+|hm+|huh+)\\b"
    - "^\\s*why\\b"
    - "\\bwhy (sonnet|opus|claude|nemotron|gpt|that|this|did|would|should|is|are|not)\\b"
    - "\\btell me (about|more|why|how|what)\\b"
    - "\\bwhat'?s (going on|up|happening|wrong|the deal|the problem)\\b"
    - "\\bhow come\\b"
    - "\\bthoughts\\?"
    - "^\\s*(not optimal|suboptimal|weird|strange|janky|confusing|confused)\\b"
    - "\\bhow (does|do) (the |this )?(routing|router|harness|agent) work\\b"

directives:
  "/code": code
  "/chat": chat
  "/create": create
  "/plan": orchestrate
  "/task": task
  "/local": local
  "/phatic": phatic
  "/identity": identity

fallback_chain:
  # 4.7 kept in the chain so a caller that explicitly pins
  # it still degrades cleanly; not a default anywhere.
  claude-opus-4-7: [claude-opus-4-6, claude-sonnet-4-6]
  claude-opus-4-6: [claude-sonnet-4-6]
  claude-sonnet-4-6: [claude-opus-4-6]
  gpt-5.4: [claude-sonnet-4-6, claude-opus-4-6]
  # Local Nemotron roles fall to Sonnet if vLLM is down so a bare
  # 'hi' or 'which model are you?' never hard-fails.
  nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8: [claude-sonnet-4-6]

# Round 5: @alias model pin. Prefix any turn with @<alias> to force a
# specific model for that turn. Role determination is unchanged — only
# the model is swapped. Useful for quick A/B on voice/vibe or for pinning
# a specific capability: "@opus47 walk me through this proof",
# "@nemotron summarize this", "@sonnet hey". Bare "@sonnet" with no
# payload routes as a greeting on Sonnet.
model_aliases:
  "@opus": claude-opus-4-6
  "@opus4.6": claude-opus-4-6
  "@opus4.7": claude-opus-4-7
  "@opus46": claude-opus-4-6
  "@opus47": claude-opus-4-7
  "@sonnet": claude-sonnet-4-6
  "@sonnet4.6": claude-sonnet-4-6
  "@sonnet46": claude-sonnet-4-6
  "@nemotron": nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
  "@local": nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-FP8
  "@gpt": gpt-5.4
  "@gpt5": gpt-5.4

budgets:
  per_turn_usd: 2.0
  per_session_usd: 25.0
  warn_pct: 0.8
  # PROBE_BUDGET_AUTO_ESCALATE_v1
  # Probe sub-turn budget for no-tool roles. Raised from 3 to 8.
  # On exhaust the harness auto-escalates to task role.
  probe_per_turn: 8