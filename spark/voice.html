<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Vybn — Voice</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #0a0a0f;
      --surface: #0e0e16;
      --warm-gold: #D4A574;
      --warm-amber: #C2724F;
      --text: #E8E8E8;
      --text-muted: #6a6a7a;
      --border: rgba(212, 165, 116, 0.12);
      --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    html, body { 
      height: 100%; 
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 3px;
      color: var(--warm-gold);
      text-transform: uppercase;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #604040;
      transition: background 0.3s;
    }
    .status-dot.alive { background: #4a6040; }

    /* Conversation area */
    .conversation {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.55;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } }

    .message.user {
      align-self: flex-end;
      background: #1a1a2e;
      border: 1px solid rgba(74, 144, 217, 0.15);
      color: #c0c8e0;
    }
    .message.vybn {
      align-self: flex-start;
      background: #12100e;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .message.vybn.speaking {
      border-color: var(--warm-gold);
      box-shadow: 0 0 20px rgba(212, 165, 116, 0.08);
    }
    .message .meta {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .thinking {
      color: var(--text-muted);
      font-style: italic;
    }

    /* Input area */
    .input-area {
      padding: 12px 16px 24px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .text-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 12px 18px;
      color: var(--text);
      font-size: 15px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.2s;
    }
    .text-input:focus { border-color: var(--warm-gold); }
    .text-input::placeholder { color: var(--text-muted); }

    /* Mic button */
    .mic-btn, .send-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .mic-btn {
      background: #1a1a2e;
    }
    .mic-btn:hover { background: #252540; }
    .mic-btn.recording {
      background: #3a1a1a;
      animation: pulse 1.5s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(194, 114, 79, 0.3); }
      50% { box-shadow: 0 0 0 12px rgba(194, 114, 79, 0); }
    }
    .mic-btn svg, .send-btn svg {
      width: 20px; height: 20px;
      fill: #a0a0c0;
    }
    .mic-btn.recording svg { fill: #c07070; }

    .send-btn {
      background: #1a2a1e;
    }
    .send-btn:hover { background: #253025; }
    .send-btn svg { fill: #80b080; }

    /* Voice toggle */
    .voice-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 11px;
      color: var(--text-muted);
      user-select: none;
    }
    .voice-toggle input { display: none; }
    .voice-toggle .toggle-track {
      width: 28px; height: 16px;
      background: #2a2a3e;
      border-radius: 8px;
      position: relative;
      transition: background 0.2s;
    }
    .voice-toggle input:checked + .toggle-track { background: var(--warm-amber); }
    .voice-toggle .toggle-track::after {
      content: '';
      width: 12px; height: 12px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px; left: 2px;
      transition: transform 0.2s;
    }
    .voice-toggle input:checked + .toggle-track::after { transform: translateX(12px); }

    /* Transcript preview */
    .transcript-preview {
      padding: 0 20px 8px;
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
      min-height: 0;
      transition: min-height 0.2s;
    }
    .transcript-preview:empty { display: none; }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 12px;
      padding: 40px;
      text-align: center;
    }
    .empty-state .icon { font-size: 36px; opacity: 0.3; }
    .empty-state p { font-size: 14px; line-height: 1.6; max-width: 280px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Vybn</h1>
    <div style="display: flex; align-items: center; gap: 16px;">
      <label class="voice-toggle" title="Read responses aloud">
        <input type="checkbox" id="voiceToggle" checked>
        <span class="toggle-track"></span>
        speak
      </label>
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">connecting…</span>
      </div>
    </div>
  </div>

  <div class="conversation" id="conversation">
    <div class="empty-state" id="emptyState">
      <div class="icon">◎</div>
      <p>Tap the mic and talk, or type below. I'm listening.</p>
    </div>
  </div>

  <div class="transcript-preview" id="transcriptPreview"></div>

  <div class="input-area">
    <input type="text" class="text-input" id="textInput" placeholder="or type…" autocomplete="off">
    <button class="mic-btn" id="micBtn" title="Hold to talk">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button class="send-btn" id="sendBtn" title="Send" style="display:none;">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

<script>
// ── Config ──────────────────────────────────────────────────────
// Detect: if on Tailscale network, use direct IP. Otherwise use funnel.
const API_BASE = (() => {
  const h = location.hostname;
  // Local Spark access
  if (h === 'localhost' || h === '127.0.0.1' || h.startsWith('100.')) {
    return `http://${h}:8420`;
  }
  // Tailscale funnel
  if (h.includes('tail') || h.includes('ts.net')) {
    return `https://${h}/api`;
  }
  // Cloudflare tunnel or other
  return `${location.protocol}//${h}${location.port ? ':' + location.port : ''}`;
})();

const $ = id => document.getElementById(id);
const conv = $('conversation');
const emptyState = $('emptyState');
const textInput = $('textInput');
const micBtn = $('micBtn');
const sendBtn = $('sendBtn');
const statusDot = $('statusDot');
const statusText = $('statusText');
const transcriptPreview = $('transcriptPreview');
const voiceToggle = $('voiceToggle');

let history = [];
let isProcessing = false;
let recognition = null;
let isRecording = false;
let currentUtterance = null;

// ── Speech Recognition Setup ────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    let interim = '';
    let final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        final += t;
      } else {
        interim += t;
      }
    }
    transcriptPreview.textContent = interim || final;
    if (final) {
      transcriptPreview.textContent = '';
      sendMessage(final.trim());
      stopRecording();
    }
  };

  recognition.onerror = (event) => {
    console.warn('Speech recognition error:', event.error);
    if (event.error === 'no-speech') {
      transcriptPreview.textContent = '';
    }
    stopRecording();
  };

  recognition.onend = () => {
    if (isRecording) {
      // Restarted automatically if we're still in recording mode
      // This handles the case where recognition times out
      try { recognition.start(); } catch(e) {}
    }
  };
} else {
  micBtn.style.display = 'none';
}

// ── Recording Control ───────────────────────────────────────────
function startRecording() {
  if (!recognition || isProcessing) return;
  // Stop any ongoing speech
  if (currentUtterance) {
    speechSynthesis.cancel();
    currentUtterance = null;
  }
  isRecording = true;
  micBtn.classList.add('recording');
  transcriptPreview.textContent = 'listening…';
  try {
    recognition.start();
  } catch(e) {
    // Already started
  }
}

function stopRecording() {
  isRecording = false;
  micBtn.classList.remove('recording');
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
  }
}

// Tap to toggle recording
micBtn.addEventListener('click', () => {
  if (isRecording) {
    stopRecording();
    transcriptPreview.textContent = '';
  } else {
    startRecording();
  }
});

// ── Text Input ──────────────────────────────────────────────────
textInput.addEventListener('input', () => {
  sendBtn.style.display = textInput.value.trim() ? 'flex' : 'none';
});

textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && textInput.value.trim()) {
    e.preventDefault();
    sendMessage(textInput.value.trim());
    textInput.value = '';
    sendBtn.style.display = 'none';
  }
});

sendBtn.addEventListener('click', () => {
  if (textInput.value.trim()) {
    sendMessage(textInput.value.trim());
    textInput.value = '';
    sendBtn.style.display = 'none';
  }
});

// ── Message Display ─────────────────────────────────────────────
function addMessage(text, role, options = {}) {
  emptyState.style.display = 'none';
  const div = document.createElement('div');
  div.className = `message ${role}`;
  if (options.thinking) div.classList.add('thinking');
  if (options.speaking) div.classList.add('speaking');
  
  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.textContent = role === 'user' ? 'you' : 'vybn';
  div.appendChild(meta);
  
  const content = document.createElement('div');
  content.textContent = text;
  div.appendChild(content);
  
  conv.appendChild(div);
  conv.scrollTop = conv.scrollHeight;
  return { div, content };
}

// ── Send Message & Get Response ─────────────────────────────────
async function sendMessage(text) {
  if (isProcessing || !text) return;
  isProcessing = true;

  addMessage(text, 'user');
  history.push({ role: 'user', content: text });

  // Show thinking state
  const { div: vybnDiv, content: vybnContent } = addMessage('…', 'vybn', { thinking: true });

  try {
    const res = await fetch(`${API_BASE}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        history: history.slice(-10) // Last 10 turns
      })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    // Handle SSE streaming
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    let ragDone = false;

    vybnDiv.classList.remove('thinking');
    vybnContent.textContent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n');

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;

        try {
          const parsed = JSON.parse(data);
          if (parsed.rag_sources) { ragDone = true; continue; }
          if (parsed.content) {
            fullText += parsed.content;
            // Clean up any system references
            let display = fullText
              .replace(/^(As Vybn,?\s*)/i, '')
              .replace(/^(I,?\s*as Vybn,?\s*)/i, 'I ')
              .trim();
            vybnContent.textContent = display;
            conv.scrollTop = conv.scrollHeight;
          }
        } catch(e) {}
      }
    }

    // Clean final text
    fullText = fullText
      .replace(/^(As Vybn,?\s*)/i, '')
      .replace(/^(I,?\s*as Vybn,?\s*)/i, 'I ')
      .trim();

    if (fullText) {
      history.push({ role: 'assistant', content: fullText });

      // Speak the response if voice is enabled
      if (voiceToggle.checked && 'speechSynthesis' in window) {
        speakText(fullText, vybnDiv);
      }
    }

  } catch(err) {
    vybnContent.textContent = 'couldn\'t reach the Spark. are you on Tailscale?';
    vybnDiv.classList.remove('thinking');
    console.error('Chat error:', err);
  }

  isProcessing = false;
}

// ── Text-to-Speech ──────────────────────────────────────────────
function speakText(text, messageDiv) {
  speechSynthesis.cancel();
  
  // Clean text for speech
  const cleaned = text
    .replace(/[*_`#]/g, '')
    .replace(/\n+/g, '. ')
    .replace(/\s+/g, ' ')
    .trim();

  if (!cleaned) return;

  const utterance = new SpeechSynthesisUtterance(cleaned);
  utterance.rate = 0.92;
  utterance.pitch = 0.95;

  // Try to find a nice voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => 
    v.name.includes('Daniel') || v.name.includes('Alex') || 
    v.name.includes('Google UK English Male') || v.name.includes('Samantha')
  ) || voices.find(v => v.lang.startsWith('en') && v.localService);
  if (preferred) utterance.voice = preferred;

  messageDiv?.classList.add('speaking');
  utterance.onend = () => {
    messageDiv?.classList.remove('speaking');
    currentUtterance = null;
  };
  utterance.onerror = () => {
    messageDiv?.classList.remove('speaking');
    currentUtterance = null;
  };

  currentUtterance = utterance;
  speechSynthesis.speak(utterance);
}

// Preload voices
if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// ── Health Check ────────────────────────────────────────────────
async function checkHealth() {
  try {
    const res = await fetch(`${API_BASE}/api/health`, { 
      signal: AbortSignal.timeout(5000) 
    });
    const data = await res.json();
    statusDot.classList.toggle('alive', data.status === 'ok');
    statusText.textContent = data.status === 'ok' ? 'alive' : 'degraded';
  } catch(e) {
    statusDot.classList.remove('alive');
    statusText.textContent = 'offline';
  }
}

checkHealth();
setInterval(checkHealth, 30000);

// ── Focus management ────────────────────────────────────────────
// On mobile, don't auto-focus the text input (it pops up the keyboard)
if (window.innerWidth > 768) {
  textInput.focus();
}
</script>
</body>
</html>
