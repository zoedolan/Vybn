id: risk_memory_budget
name: "Memory Budget for Adapter Training"
severity: medium  # critical | high | medium | low
status: open  # open | mitigated | resolved | accepted
description: |
  With vLLM at 0.70 GPU memory utilization, approximately 76.8 GB remains for
  adapter operations across both GB10 chips. A rank-32 LoRA adapter on
  attention layers of a 229B model is relatively small (~200-400MB), but the
  training process requires optimizer states, gradient buffers, and activation
  checkpoints.

  With AWQ's already tight memory footprint, there may not be enough headroom
  for FlexLLM-style token-level co-serving. The training overhead scales with
  batch size and sequence length, and gradient checkpointing adds memory for
  storing intermediate activations.

  The concern is that the total memory required for simultaneous inference +
  training may exceed the available 76.8 GB budget, forcing a choice between
  co-serving quality and training capability.
mitigation: |
  Start with the simpler background-training-then-hot-swap approach rather
  than FlexLLM-style co-serving. This decouples inference and training
  memory budgets — training runs during low-load periods when more memory
  is available.

  Use gradient checkpointing aggressively to trade compute for memory.
  Consider GaLore-style gradient projection to reduce optimizer memory
  (projects gradients to low-rank space, reducing optimizer state size).

  If necessary, reduce vLLM utilization to 0.60 to free additional memory
  for training. This reduces inference throughput but ensures training can
  proceed.

  Monitor actual memory usage carefully during initial experiments to
  establish the real budget constraints.
affected_layers:
  - "layer_2_fast_adaptation"
  - "layer_3_slow_consolidation"
