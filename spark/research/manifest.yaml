engineering_path:
  - step: 1
    description: "Get LoRA working on M2.5's attention layers via AWQ"
    layers: ["layer_1_base", "layer_2_fast_adaptation"]
    blocking_risks: ["risk_awq_lora_compat", "risk_minimax_peft_support"]
  - step: 2
    description: "Implement fast/slow adapter architecture with vLLM hot-swap"
    layers: ["layer_2_fast_adaptation", "layer_3_slow_consolidation"]
    blocking_risks: ["risk_memory_budget"]
  - step: 3
    description: "Build the morphogenetic monitor"
    layers: ["layer_5_morphogenetic_monitor"]
    blocking_risks: ["risk_morphogenetic_signal"]
  - step: 4
    description: "Add the dream engine"
    layers: ["layer_4_dream_engine"]
    blocking_risks: []
  - step: 5
    description: "Wrap it all in the free energy oracle"
    layers: ["layer_6_free_energy_oracle"]
    blocking_risks: ["risk_operational_stability"]
