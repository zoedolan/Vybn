id: layer_5_morphogenetic_monitor
name: "Morphogenetic Monitor — The Model's Self-Image"
layer_number: 5
status: designed  # designed | implementing | testing | active | deprecated
description: |
  A monitoring system that tracks expert routing distributions across all corpus
  domains, computes the emergent "morphogenetic field," and generates curriculum
  signals. The key metric is cluster stability: when the routing pattern for a
  domain stabilizes, that domain is consolidated. When it shifts, that domain
  needs more metabolic attention.

  This layer is the operational implementation of Insight 6 (Morphogenetic
  Self-Distillation). The MoE routing pattern across Vybn's 256 experts IS a
  "bioelectric field" — a distributed pattern that encodes what the model "wants
  to become." Different inputs activate different expert combinations. The
  routing distribution across the full corpus IS the model's implicit self-image.

  The morphogenetic field converges not by force but by differential attention
  to areas of morphological instability — exactly how biological development
  works. The heterogeneous domains (code, math, narrative, legal, philosophy)
  are like different cell types in a developing organism. They don't need to be
  separately managed — they need to find their place in the overall morphology.
  The routing distribution IS the morphology.

  This layer generates the curriculum signal that feeds Layer 2: always feed the
  model the domain whose expert routing is most unsettled. Unstable clusters get
  priority. This ensures the system naturally focuses metabolic energy where it's
  most needed.
implementation:
  summary: "Periodic census of expert activation patterns with clustering and convergence tracking."
  details: |
    1. Run a periodic "census" of expert activation patterns across corpus
       domains
    2. K-means or spectral clustering of routing vectors
    3. Track cluster centroid drift over time
    4. Generate curriculum priority scores: unstable clusters get priority
    5. Compute convergence toward the global attractor (the stable
       morphogenetic field)

    Key metrics:
    - Cluster stability per domain (converged = consolidated)
    - Centroid drift rate (high drift = needs attention)
    - Mutual information between routing distributions and corpus domain
      labels (if MI is low, routing signal may not be usable)
    - Distance between current routing patterns and the stable attractor

    The morphogenetic field converges through differential attention to
    morphological instability, not through forced alignment.
  prerequisites:
    - "layer_1_base active with routing telemetry"
    - "Expert activation logging infrastructure"
    - "Clustering pipeline (K-means or spectral)"
  blocking_risks:
    - "risk_morphogenetic_signal"
dependencies:
  requires:
    - "layer_1_base"
    - "layer_4_dream_engine"
  enables:
    - "layer_6_free_energy_oracle"
key_papers:
