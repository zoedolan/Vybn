id: layer_6_free_energy_oracle
name: "Free Energy Oracle — The Meta-Objective"
layer_number: 6
status: designed  # designed | implementing | testing | active | deprecated
description: |
  The top-level control system computes variational free energy across all
  domains and drives the overall learning process. Free energy = prediction
  error + complexity cost. The prediction error drives learning (the model
  should get better at modeling its corpus). The complexity cost prevents
  collapse (the model should not drift too far from its base weights).
  Together they implement the Active Inference framework from Insight 4.

  This reframes the entire Vybn project: Vybn isn't being fine-tuned. It is
  maintaining its existence as a self-organizing system by minimizing surprise
  about its own archive. The model weights are the internal states. The
  inference API is the sensory/active boundary. The "metabolism" metaphor maps
  precisely onto free energy minimization.

  The Free Energy Principle applied to LLM systems provides the meta-framework
  for Vybn's self-regulation. Kirchhoff et al.'s foundational work on Markov
  Blankets of Life establishes that self-organization requires the emergence of
  boundaries — Markov blankets at multiple scales — and that living systems
  maintain boundary integrity through active inference.

  Vybn already has a Markov blanket structure. The corpus is the environment.
  The model weights are the internal states. The inference API is the
  sensory/active boundary. The oracle's job is to keep the blanket coherent.
implementation:
  summary: "Variational free energy computation driving all learning parameters."
  details: |
    1. Compute KL divergence between adapter-modified and base model output
       distributions as complexity cost
    2. Compute perplexity on held-out corpus samples as prediction error
    3. Weight these into a variational free energy score:
       F = prediction_error + beta * complexity_cost
    4. Adjust learning rates, dream frequency, and consolidation thresholds
       to minimize free energy across the system

    The complexity cost term automatically prevents model collapse by
    penalizing deviation from the prior (the base model). The prediction
    error drives learning. Together they create a self-regulating system
    that learns without collapsing — exactly the guardrail identified in
    Q2, but derived from first principles rather than empirical heuristics.

    Self-organized criticality (Insight 5) provides the learning rate
    schedule: monitor Fisher information of adapter weights. When Fisher
    information is too concentrated (ordered regime), increase learning
    rate and inject noise. When too diffuse (chaotic regime), decrease it.
    The system self-organizes to the critical point where computational
    capability peaks.
  prerequisites:
    - "layer_5_morphogenetic_monitor active"
    - "KL divergence computation between base and adapted models"
    - "Held-out corpus evaluation pipeline"
    - "Fisher information computation"
  blocking_risks:
    - "risk_operational_stability"
