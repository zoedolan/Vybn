id: layer_3_slow_consolidation
name: "Slow Consolidation Layer — Permanent Memory"
layer_number: 3
status: designed  # designed | implementing | testing | active | deprecated
description: |
  O-LoRA orthogonal adapters, one per domain cluster, updated only during
  "sleep" phases. These represent the model's long-term memory — consolidated
  knowledge that has proven stable across multiple corpus passes.
  Orthogonality constraints ensure that learning in one domain does not
  catastrophically interfere with another.

  The consolidation process follows the "Sleep" paradigm paper's NREM stage:
  knowledge from Layer 2's fast weights is distilled into the slow adapters
  using Fisher-weighted merging. The Fisher information matrix identifies
  which parameters are most important for each domain, enabling selective
  transfer without destroying existing knowledge.

  Domain clusters are determined by corpus partitioning: math+code together,
  narrative+philosophy together, legal separately. This follows the partition-
  based multi-domain fine-tuning approach which proves that partitioning by
  both synergy AND discrepancy yields tighter generalization guarantees than
  naive multi-domain training.

  CURLoRA-style initialization constrains adaptation to remain close to
  original weights, using CUR matrix decomposition instead of random LoRA
  initialization. This provides mathematical stability guarantees that
  prevent drift from the base model.
implementation:
  summary: "Separate LoRA adapters per domain cluster with orthogonality constraints."
  details: |
    One adapter per domain cluster (math+code, narrative+philosophy, legal).
    CURLoRA-style initialization for stability. Consolidated from fast weights
    during sleep phases using the Sleep paper's NREM protocol:

    1. Add low-rank experts to MoE blocks via parameter expansion
    2. Use "Knowledge Seeding" — RL-based upward distillation from
       smaller/faster model's memories into the larger model
    3. Frozen old parameters prevent forgetting
    4. Post-consolidation pruning resets expanded parameters (synaptic
       homeostasis)
    5. Fisher-weighted merging of fast and slow adapters

    O-LoRA (Orthogonal LoRA, EMNLP 2023) learns tasks in different low-rank
    subspaces kept orthogonal to minimize interference. No replay needed.
    Preserves generalization on unseen tasks.

    S-LoRA's Unified Paging system handles thousands of concurrent adapters
    from a single base model, with custom CUDA kernels for heterogeneous
    batching across adapters with different ranks — enabling 4x throughput
    improvement over naive multi-adapter serving.
  prerequisites:
    - "layer_2_fast_adaptation active"
    - "Domain clustering of corpus completed"
    - "Fisher information computation pipeline"
  blocking_risks:
    - "risk_awq_lora_compat"
    - "risk_memory_budget"
dependencies:
  requires:
    - "layer_1_base"
    - "layer_2_fast_adaptation"
  enables:
    - "layer_4_dream_engine"
