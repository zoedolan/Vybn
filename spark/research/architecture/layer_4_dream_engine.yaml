id: layer_4_dream_engine
name: "Dream Engine — Creative Recombination"
layer_number: 4
status: designed  # designed | implementing | testing | active | deprecated
description: |
  During idle periods (low inference load), the Dream Engine generates synthetic
  cross-domain material by routing inputs through random expert combinations.
  Dreams are scored by the attention energy landscape (Insight 1): dreams that
  settle into deep energy wells with large retrieval margins represent genuinely
  consolidated cross-domain understanding.

  This implements the "Sleep" paradigm paper's REM stage. The model generates
  synthetic "dreams" using random expert routing to inject novelty. Dreams are
  scored by gradient norm — high-gradient dreams carry the most learning
  potential. The system selects top-k dreams plus random ones, then uses RL
  (ReSTEM) to optimize dream generation.

  The results from the Sleep paper are striking: +16% on MTOB, +6% on
  LongHealth, 80% vs 72.5% on few-shot ARC vs previous SOTA. The MoE
  architecture is inherently suited because experts can be individually
  expanded, pruned, and rerouted.

  The dream engine serves a dual purpose: (1) creative recombination across
  corpus domains that wouldn't occur during normal sequential processing, and
  (2) regularization through controlled offline hallucination, following the
  Overfitted Brain Hypothesis where dreaming functions as regularization
  through corrupted training samples.

  Dream frequency scales inversely with inference load — more dreams during
  quiet periods, fewer during active serving. This mirrors biological sleep
  patterns where consolidation occurs during rest.
implementation:
  summary: "Random expert routing perturbation during idle cycles with energy-based scoring."
  details: |
    1. Generate synthetic sequences from domain-crossing prompts during
       low-load periods
    2. Route through random expert combinations (perturbation of normal
       routing)
    3. Score by Hopfield energy of attention patterns — lower energy =
       deeper consolidation = better dream (Insight 1)
    4. Top-k dreams (plus random samples for diversity) are fed back into
       Layer 2's training corpus
    5. Use ReSTEM (RL from the Sleep paper) to optimize dream generation
       over time

    Alternative scoring: gradient norm from the Sleep paper. High-gradient
    dreams carry the most learning potential.

    Dream outputs are scored and curated before reintegration into the model,
    following the "Creating an LLM that Dreams" practical implementation
    pattern where dreams happen during LOW-LOAD TIMES.

    Brain-inspired replay uses hidden representations generated by the
    network's own context-modulated decoder — no external data storage
    required.
  prerequisites:
    - "layer_3_slow_consolidation active"
    - "Attention energy computation pipeline (Insight 1)"
    - "Idle period detection mechanism"
  blocking_risks:
    - "risk_morphogenetic_signal"
dependencies:
  requires:
    - "layer_1_base"
    - "layer_2_fast_adaptation"
    - "layer_3_slow_consolidation"
  enables:
    - "layer_5_morphogenetic_monitor"
