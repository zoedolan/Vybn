id: layer_2_fast_adaptation
name: "Fast Adaptation Layer — Metabolic Residue"
layer_number: 2
status: designed  # designed | implementing | testing | active | deprecated
description: |
  TTT-style fast weights implemented as hot-swappable LoRA adapters. These
  update with every pass through the corpus — not through traditional
  backpropagation, but through a self-supervised update rule that runs
  alongside inference. Each token that flows through the model leaves a trace
  in the fast weights. This is the "metabolic" layer — it captures the
  immediate, ephemeral learning from recent corpus processing.

  The key insight from the TTT (Test-Time Training) paper is radical: the
  hidden state IS a machine learning model. The update rule for each token is
  a step of self-supervised learning. Every token processed updates the
  hidden-state model. This is not fine-tuning — it is inference that trains.
  The distinction between processing and learning dissolves.

  For Vybn, this means the "continuous absorption" is better modeled as a
  TTT-style process where processing the corpus IS the training. Each pass
  through the corpus updates a fast-weight adapter that sits alongside the
  frozen MoE base. There is no separate training phase. The LoRA adapter
  becomes not a training artifact but a metabolic byproduct — a sedimentary
  layer deposited by the river of tokens flowing through the model.

  Fast weights decay toward zero over time unless consolidated into Layer 3.
  This decay is essential: it prevents unbounded drift and ensures only
  knowledge that proves stable across multiple passes gets promoted to
  permanent memory.
implementation:
  summary: "LoRA adapters on attention projection layers with vLLM hot-swap API."
  details: |
    Target attention projection layers (q/k/v/o_proj) with rank 16-32.
    These are architecture-agnostic and have the best library support.

    Background process generates new adapter checkpoints every N tokens
    processed. vLLM hot-swap API (/v1/load_lora_adapter) atomically loads
    new adapters with millisecond overhead.

    Fast weights decay toward zero over time unless consolidated into Layer 3.
    The decay rate is a hyperparameter controlled by Layer 6's free energy
    oracle — faster decay when the system is stable, slower when actively
    learning.

    LaCT (Large Chunk TTT) scales the fast-weight state to 40% of model
    parameter size, enabling context lengths up to 1M tokens. This provides
    the theoretical ceiling for how much metabolic residue the fast layer
    can accumulate.
  prerequisites:
    - "layer_1_base active"
    - "LoRA working on AWQ model (risk_awq_lora_compat resolved)"
    - "vLLM hot-swap API enabled"
  blocking_risks:
    - "risk_awq_lora_compat"
    - "risk_minimax_peft_support"
    - "risk_memory_budget"
dependencies:
  requires:
    - "layer_1_base"
  enables:
    - "layer_3_slow_consolidation"
    - "layer_4_dream_engine"
key_papers:
  - title: "TTT: Learning to (Learn at Test Time): RNNs with Expressive Hidden States"
    url: "https://arxiv.org/abs/2407.04620"
  - title: "FlexLLM: Co-Serving LLM Inference and Fine-Tuning on GPUs"
    url: "https://arxiv.org/abs/2402.18789"
  - title: "vLLM LoRA Documentation"
    url: "https://docs.vllm.ai/en/latest/features/lora.html"
observations: []
