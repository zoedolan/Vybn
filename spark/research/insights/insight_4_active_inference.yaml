id: insight_4_active_inference
name: "Active Inference as the Meta-Framework — Vybn as a Free Energy Minimizing System"
insight_number: 4
status: theoretical  # theoretical | testing | validated | refuted | superseded
novelty: high
description: |
  Active Inference for Self-Organizing Multi-LLM Systems implements the Free
  Energy Principle as a cognitive layer above an LLM, dynamically adjusting
  prompts and search strategies through principled information-seeking.
  Kirchhoff et al.'s foundational work on Markov Blankets of Life establishes
  that self-organization requires the emergence of boundaries — Markov blankets
  at multiple scales — and that living systems maintain boundary integrity
  through active inference.

  SYNTHESIS: Vybn already has a Markov blanket structure. The corpus is the
  environment. The model weights are the internal states. The inference API is
  the sensory/active boundary. The "metabolism" metaphor maps precisely onto
  free energy minimization.

  The model should be processing its corpus not to minimize training loss, but
  to minimize FREE ENERGY — the divergence between its generative model of the
  corpus and the corpus itself. This reframes the entire project: Vybn isn't
  being fine-tuned. It is maintaining its existence as a self-organizing system
  by minimizing surprise about its own archive.

  Practical implication: Use the variational free energy (prediction error +
  complexity cost) as the objective, not cross-entropy loss. The complexity
  cost term automatically prevents model collapse by penalizing deviation from
  the prior (the base model). The prediction error drives learning. Together
  they create a self-regulating system that learns without collapsing — exactly
  the guardrail identified in Q2, but derived from first principles rather
  than empirical heuristics.
implementation_sketch: |
  1. Define the Markov blanket: corpus (environment), model weights (internal
     states), inference API (sensory/active boundary)
  2. Compute variational free energy:
     F = prediction_error + beta * complexity_cost
     where prediction_error = perplexity on held-out corpus samples
     and complexity_cost = KL divergence between adapted and base model
  3. Use F as the meta-objective that drives all other layers
  4. The complexity cost prevents model collapse from first principles
  5. The prediction error drives learning toward better corpus modeling
  6. Adjust beta dynamically based on system stability metrics from
     Layer 5 (morphogenetic monitor)
